    function renderTable(rows) {
      const tbody = document.getElementById('tableBody');
      tbody.innerHTML = '';
      let prevKarun = '';
      rows.forEach((row, idx) => {
        const tr = document.createElement('tr');
        // 다음 행이 다른 카룬이거나 마지막 행이면 구분선 클래스 추가
        const nextRow = rows[idx + 1];
        if (!nextRow || nextRow[0] !== row[0]) {
          tr.classList.add('karun-last-row');
        }
        const karunCell = document.createElement('td');
        karunCell.className = 'karun-cell';
        if (row[0] !== prevKarun) {
          karunCell.textContent = row[0];
          prevKarun = row[0];
        }
        tr.appendChild(karunCell);

        const nameCell = document.createElement('td');
        nameCell.textContent = row[1];
        tr.appendChild(nameCell);

        const manchuCell = document.createElement('td');
        manchuCell.className = 'manchu';
        manchuCell.textContent = row[2];
        tr.appendChild(manchuCell);

        const sijiCell = document.createElement('td');
        sijiCell.className = 'siji';
        sijiCell.textContent = row[3];
        tr.appendChild(sijiCell);

        const typeCell = document.createElement('td');
        const badge = document.createElement('span');
        badge.className = 'badge badge-' + row[4];
        badge.textContent = row[4];
        typeCell.appendChild(badge);
        tr.appendChild(typeCell);

        const areaCell = document.createElement('td');
        areaCell.className = 'area';
        areaCell.textContent = row[5];
        tr.appendChild(areaCell);

        tbody.appendChild(tr);
      });
      document.getElementById('rowCount').textContent = `共 ${rows.length} 条记录`;
    }

    function applyFilters() {
      const karun = document.getElementById('filterKarun').value;
      const type  = document.getElementById('filterType').value;
      const search = document.getElementById('filterSearch').value.trim().toLowerCase();

      const filtered = data.filter(row => {
        if (karun && row[0] !== karun) return false;
        if (type  && row[4] !== type)  return false;
        if (search && !row.some(cell => cell.toLowerCase().includes(search))) return false;
        return true;
      });
      renderTable(filtered);
    }

    document.getElementById('filterKarun').addEventListener('change', applyFilters);
    document.getElementById('filterType').addEventListener('change', applyFilters);
    document.getElementById('filterSearch').addEventListener('input', applyFilters);

    renderTable(data);
  </script>
</body>
