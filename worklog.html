<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Work Log – Map of Mukden's Hunting Ground</title>
  <link rel="stylesheet" href="./css/site.css" />
  <style>
    html, body { height: 100%; margin: 0; background: #ffffff; font-family: system-ui, -apple-system, Segoe UI, Roboto, sans-serif; color: #111; }

    .topnav {
      position: fixed;
      top: 0; left: 0; right: 0;
      height: 44px;
      display: flex;
      gap: 48px;
      align-items: center;
      padding: 0 80px;
      background: rgba(255,255,255,0.95);
      z-index: 1000;
      border-bottom: 1px solid #ddd;
    }
    .topnav a { text-decoration: none; color: #111; font-weight: 600; font-family: sans-serif; }

    .page-body {
      margin-top: 44px;
      padding: 32px 48px 64px;
      max-width: 1296px;
      margin-left: auto;
      margin-right: auto;
    }

    h1 {
      font-size: 22px;
      font-weight: 700;
      margin: 0 0 6px 0;
      letter-spacing: 0.5px;
    }
    .subtitle {
      font-size: 13px;
      color: #666;
      margin-bottom: 28px;
      font-family: sans-serif;
    }

    .toolbar {
      display: flex;
      justify-content: flex-end;
      margin-bottom: 18px;
    }

    .btn-add {
      font-size: 13px;
      font-family: sans-serif;
      padding: 5px 14px;
      border: 1px solid #3a3028;
      border-radius: 4px;
      background: #3a3028;
      color: #f5f0e8;
      cursor: pointer;
      font-weight: 600;
      transition: background .15s;
    }
    .btn-add:hover { background: #5a4a3a; }

    .table-wrap {
      overflow-x: auto;
      border: 1px solid #e0e0e0;
      border-radius: 4px;
      background: #fff;
    }

    table {
      width: 100%;
      min-width: 600px;
      table-layout: fixed;
      border-collapse: collapse;
      font-size: 13px;
      line-height: 1.55;
    }

    thead tr {
      background: #3a3028;
      color: #f5f0e8;
    }
    thead th {
      padding: 10px 14px;
      text-align: left;
      font-weight: 700;
      font-family: sans-serif;
      white-space: nowrap;
      letter-spacing: 0.3px;
      border-right: 1px solid #5a4a3a;
      font-size: 14px;
    }
    thead th:last-child { border-right: none; }

    tbody tr { border-bottom: 1px solid #f0f0ee; }
    tbody tr:last-child { border-bottom: none; }
    tbody tr:nth-child(even) { background: #f9f9f9; }
    tbody tr:nth-child(odd)  { background: #ffffff; }
    tbody tr:hover { background: #e8f0fe; }

    td {
      padding: 9px 14px;
      vertical-align: top;
      border-right: 1px solid #e0e0e0;
    }
    td:last-child { border-right: none; }

    td.td-date {
      white-space: nowrap;
      font-size: 13px;
      color: #333;
      width: 150px;
    }

    td.td-content {
      font-size: 13px;
      color: #111;
    }
    td.td-content .detail {
      font-size: 12px;
      color: #666;
      margin-top: 3px;
    }

    td.td-timestamp {
      white-space: nowrap;
      font-size: 12px;
      color: #888;
      font-family: monospace;
      width: 150px;
    }

    td.td-actions {
      width: 80px;
      white-space: nowrap;
    }

    .btn-edit, .btn-del {
      font-size: 11px;
      padding: 2px 8px;
      border-radius: 3px;
      cursor: pointer;
      border: 1px solid #ccc;
      background: #fff;
      color: #333;
      margin-right: 3px;
    }
    .btn-edit:hover { background: #f0f4ff; border-color: #99b; }
    .btn-del { color: #900; border-color: #e8b0a0; }
    .btn-del:hover { background: #fff0ee; }

    .row-count {
      font-size: 12px;
      font-family: sans-serif;
      color: #888;
      margin-top: 10px;
    }

    /* 모달 */
    .modal-overlay {
      position: fixed; inset: 0;
      background: rgba(0,0,0,.35);
      display: flex; align-items: center; justify-content: center;
      z-index: 200;
      opacity: 0; pointer-events: none;
      transition: opacity .18s;
    }
    .modal-overlay.open { opacity: 1; pointer-events: all; }

    .modal {
      background: #fff;
      border: 1px solid #ddd;
      border-radius: 6px;
      padding: 28px 32px;
      width: 480px;
      max-width: 95vw;
      box-shadow: 0 8px 32px rgba(0,0,0,.12);
      transform: translateY(10px);
      transition: transform .18s;
    }
    .modal-overlay.open .modal { transform: translateY(0); }

    .modal h3 {
      font-size: 16px; font-weight: 700;
      margin: 0 0 20px 0;
      color: #3a3028;
    }

    .form-group { margin-bottom: 14px; }
    .form-group label {
      display: block;
      font-size: 12px; font-family: sans-serif;
      color: #555; margin-bottom: 5px; font-weight: 600;
    }
    .form-group input,
    .form-group textarea {
      width: 100%;
      padding: 7px 10px;
      font-size: 13px; font-family: sans-serif;
      border: 1px solid #ccc; border-radius: 4px;
      background: #fff; color: #111;
      box-sizing: border-box;
      outline: none;
    }
    .form-group input:focus,
    .form-group textarea:focus { border-color: #7a9; }
    .form-group textarea { resize: vertical; min-height: 70px; line-height: 1.5; }

    .modal-footer {
      display: flex; justify-content: flex-end; gap: 8px;
      margin-top: 20px; padding-top: 16px;
      border-top: 1px solid #eee;
    }
    .btn-cancel {
      font-size: 13px; padding: 6px 16px;
      border: 1px solid #ccc; border-radius: 4px;
      background: #fff; color: #444; cursor: pointer;
    }
    .btn-cancel:hover { background: #f5f5f5; }
    .btn-save {
      font-size: 13px; padding: 6px 16px;
      border: 1px solid #3a3028; border-radius: 4px;
      background: #3a3028; color: #f5f0e8;
      cursor: pointer; font-weight: 600;
    }
    .btn-save:hover { background: #5a4a3a; }

    .toast {
      position: fixed; bottom: 24px; right: 24px;
      font-size: 12px; font-family: sans-serif;
      background: #3a3028; color: #f5f0e8;
      padding: 10px 18px; border-radius: 4px;
      opacity: 0; transform: translateY(8px);
      transition: all .2s; z-index: 300;
      pointer-events: none;
    }
    .toast.show { opacity: 1; transform: translateY(0); }
  </style>
</head>
<body>

<nav class="topnav">
  <a href="https://mucenfere.github.io/">Home</a>
  <a href="./index.html">Map</a>
  <a href="./gazetteer.html">Gazetteer</a>
  <a href="./reference.html">Reference</a>
  <a href="./lop.html">Work Log</a>
</nav>

<div class="page-body">
  <h1>Work Log/作業記錄</h1>
  <p class="subtitle">Work Log – research notes, revisions, and updates</p>

  <div class="toolbar">
    <button class="btn-add" onclick="openModal()">+ 새 항목 추가</button>
  </div>

  <div class="table-wrap">
    <table>
      <colgroup>
        <col style="width: 150px;">
        <col>
        <col style="width: 150px;">
        <col style="width: 80px;">
      </colgroup>
      <thead>
        <tr>
          <th>날짜</th>
          <th>내용</th>
          <th>로그 작성 시간</th>
          <th>관리</th>
        </tr>
      </thead>
      <tbody id="tableBody"></tbody>
    </table>
  </div>
  <div class="row-count" id="rowCount"></div>
</div>

<!-- 모달 -->
<div class="modal-overlay" id="modalOverlay" onclick="closeOnBg(event)">
  <div class="modal">
    <h3 id="modalTitle">새 작업 로그</h3>
    <div class="form-group">
      <label>날짜</label>
      <input type="date" id="fDate" />
    </div>
    <div class="form-group">
      <label>내용 제목</label>
      <input type="text" id="fTitle" placeholder="예) 관련 논문 투고" />
    </div>
    <div class="form-group">
      <label>상세 내용 (선택)</label>
      <textarea id="fDetail" placeholder="예) 〈학림〉 xx호, 논문 제목 〈~~연구〉"></textarea>
    </div>
    <div class="modal-footer">
      <button class="btn-cancel" onclick="closeModal()">취소</button>
      <button class="btn-save" onclick="saveEntry()">저장</button>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
  const STORAGE_KEY = 'worklog_v1';
  let entries = [];
  let editingId = null;

  function load() {
    try {
      const raw = localStorage.getItem(STORAGE_KEY);
      entries = raw ? JSON.parse(raw) : defaultData();
    } catch { entries = defaultData(); }
  }

  function save() {
    localStorage.setItem(STORAGE_KEY, JSON.stringify(entries));
  }

  function defaultData() {
    return [
      { id: 1, date: '2026-03-11', title: '관련 논문 투고', detail: '〈학림〉 xx호, 논문 제목 〈~~연구〉', timestamp: '202603111952' }
    ];
  }

  function fmtDate(iso) {
    if (!iso) return '';
    const [y, m, d] = iso.split('-');
    return `${y}년 ${parseInt(m)}월 ${parseInt(d)}일`;
  }

  function nowTs() {
    const d = new Date();
    const p = n => String(n).padStart(2, '0');
    return `${d.getFullYear()}${p(d.getMonth()+1)}${p(d.getDate())}${p(d.getHours())}${p(d.getMinutes())}`;
  }

  function render() {
    const sorted = [...entries].sort((a, b) => b.date.localeCompare(a.date));
    const tbody = document.getElementById('tableBody');

    if (sorted.length === 0) {
      tbody.innerHTML = `<tr><td colspan="4" style="text-align:center;color:#aaa;padding:32px;font-size:13px;">등록된 항목이 없습니다.</td></tr>`;
    } else {
      tbody.innerHTML = sorted.map(e => `
        <tr>
          <td class="td-date">${fmtDate(e.date)}</td>
          <td class="td-content">
            ${esc(e.title)}
            ${e.detail ? `<div class="detail">${esc(e.detail)}</div>` : ''}
          </td>
          <td class="td-timestamp">${e.timestamp}</td>
          <td class="td-actions">
            <button class="btn-edit" onclick="openEdit(${e.id})">수정</button>
            <button class="btn-del"  onclick="del(${e.id})">삭제</button>
          </td>
        </tr>
      `).join('');
    }

    document.getElementById('rowCount').textContent = `共 ${entries.length} 条记录`;
  }

  function esc(s) {
    return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
  }

  function openModal() {
    editingId = null;
    document.getElementById('modalTitle').textContent = '새 작업 로그';
    document.getElementById('fDate').value = new Date().toISOString().split('T')[0];
    document.getElementById('fTitle').value = '';
    document.getElementById('fDetail').value = '';
    document.getElementById('modalOverlay').classList.add('open');
  }

  function openEdit(id) {
    const e = entries.find(x => x.id === id);
    if (!e) return;
    editingId = id;
    document.getElementById('modalTitle').textContent = '항목 수정';
    document.getElementById('fDate').value = e.date;
    document.getElementById('fTitle').value = e.title;
    document.getElementById('fDetail').value = e.detail || '';
    document.getElementById('modalOverlay').classList.add('open');
  }

  function closeModal() {
    document.getElementById('modalOverlay').classList.remove('open');
  }

  function closeOnBg(e) {
    if (e.target === document.getElementById('modalOverlay')) closeModal();
  }

  function saveEntry() {
    const date   = document.getElementById('fDate').value;
    const title  = document.getElementById('fTitle').value.trim();
    const detail = document.getElementById('fDetail').value.trim();
    if (!date || !title) { toast('날짜와 내용 제목을 입력해주세요.'); return; }

    if (editingId !== null) {
      const idx = entries.findIndex(x => x.id === editingId);
      if (idx > -1) entries[idx] = { ...entries[idx], date, title, detail };
      toast('수정되었습니다.');
    } else {
      const newId = entries.length ? Math.max(...entries.map(x => x.id)) + 1 : 1;
      entries.push({ id: newId, date, title, detail, timestamp: nowTs() });
      toast('추가되었습니다.');
    }
    save(); closeModal(); render();
  }

  function del(id) {
    if (!confirm('이 항목을 삭제하시겠습니까?')) return;
    entries = entries.filter(x => x.id !== id);
    save(); render(); toast('삭제되었습니다.');
  }

  function toast(msg) {
    const t = document.getElementById('toast');
    t.textContent = msg;
    t.classList.add('show');
    setTimeout(() => t.classList.remove('show'), 2200);
  }

  load();
  render();
</script>
</body>
</html>
